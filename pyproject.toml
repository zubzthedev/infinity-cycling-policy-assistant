[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
# B008: FastAPI's `Depends(...)` in a default argument is the idiomatic
# dependency-injection pattern, not the mutable-default-argument bug this
# rule targets.
ignore = ["B008"]

[tool.mypy]
python_version = "3.12"
files = ["app"]
ignore_missing_imports = true
disallow_untyped_defs = false
warn_unused_ignores = true

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
